*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

body{min-height:100dvh;display:flex;flex-direction:column}
a{color:inherit;text-decoration:none}

/* LAYOUT */
.app-shell{display:grid;grid-template-columns:260px 1fr;grid-template-rows:56px 1fr;height:100dvh;overflow:hidden}
.topbar{grid-column:1/-1;background:var(--color-surface);border-bottom:1px solid var(--color-border);display:flex;align-items:center;gap:var(--space-4);padding:0 var(--space-6);z-index:10}
.sidebar{background:var(--color-surface);border-right:1px solid var(--color-border);overflow-y:auto;padding:var(--space-4) var(--space-3)}
.main{overflow-y:auto;padding:var(--space-6)}

/* LOGO */
.logo{display:flex;align-items:center;gap:var(--space-2);font-weight:600;font-size:var(--text-sm);letter-spacing:-.02em;white-space:nowrap}
.logo svg{flex-shrink:0}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:var(--space-3)}

/* SEARCH */
.search-wrap{flex:1;max-width:480px}
.search-input{width:100%;background:var(--color-surface-offset);border:1px solid var(--color-border);border-radius:var(--radius-md);padding:var(--space-2) var(--space-4);font-family:var(--font-body);font-size:var(--text-sm);color:var(--color-text);outline:none;transition:border-color .15s}
.search-input:focus{border-color:var(--color-primary)}
.search-input::placeholder{color:var(--color-text-faint)}

/* SIDEBAR */
.sidebar-section{margin-bottom:var(--space-6)}
.sidebar-label{font-size:var(--text-xs);font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--color-text-faint);padding:0 var(--space-2);margin-bottom:var(--space-2)}
.filter-btn{display:flex;align-items:center;justify-content:space-between;width:100%;padding:var(--space-1) var(--space-2);border-radius:var(--radius-sm);font-size:var(--text-xs);color:var(--color-text-muted);background:none;border:none;cursor:pointer;transition:background .12s,color .12s;text-align:left;gap:var(--space-2)}
.filter-btn:hover{background:var(--color-surface-offset);color:var(--color-text)}
.filter-btn.active{background:var(--color-primary-highlight);color:var(--color-primary);font-weight:600}
.filter-btn .count{font-size:var(--text-xs);color:var(--color-text-faint);margin-left:auto;font-family:var(--font-mono)}
.filter-btn.active .count{color:var(--color-primary)}

/* STATS BAR */
.stats-bar{display:flex;gap:var(--space-6);margin-bottom:var(--space-5);flex-wrap:wrap;align-items:center}
.stat{display:flex;flex-direction:column}
.stat-val{font-size:var(--text-lg);font-weight:700;letter-spacing:-.03em;color:var(--color-text)}
.stat-label{font-size:var(--text-xs);color:var(--color-text-muted)}

// State
let activeLang = null;
let activeTopic = null;
let searchQuery = '';

// Compute language colors
const LANG_COLORS = {
  Python:'#3572A5',TypeScript:'#2b7489',JavaScript:'#f1e05a',
  Go:'#00ADD8',Rust:'#dea584',Swift:'#ffac45','Jupyter Notebook':'#DA5B0B',
  Shell:'#89e051',C:'#555555','C++':'#f34b7d',HTML:'#e34c26',
  Ruby:'#701516','C#':'#178600',Java:'#b07219',Vue:'#41b883',
  Zig:'#ec915c',Dart:'#00B4AB',Kotlin:'#A97BFF',Haskell:'#5e5086'
};

// Build sidebar filters
function buildSidebar() {
  const langMap = {};
  const topicMap = {};
  ALL_REPOS.forEach(r => {
    const l = r.language || 'Unknown';
    langMap[l] = (langMap[l]||0)+1;
    r.topics.forEach(t => topicMap[t] = (topicMap[t]||0)+1);
  });
  
  const langsSorted = Object.entries(langMap).sort((a,b)=>b[1]-a[1]);
  const topicsSorted = Object.entries(topicMap).sort((a,b)=>b[1]-a[1]).slice(0,50);
  
  const langEl = document.getElementById('langFilters');
  langEl.innerHTML = langsSorted.map(([lang,cnt]) => 
    `<button class="filter-btn" data-type="lang" data-val="${lang}" onclick="toggleFilter('lang','${lang}')">`+
    `<span style="display:flex;align-items:center;gap:6px"><span style="width:8px;height:8px;border-radius:50%;background:${LANG_COLORS[lang]||'var(--color-text-faint)'};flex-shrink:0"></span>${lang}</span>`+
    `<span class="count">${cnt}</span></button>`
  ).join('');
  
  const topicEl = document.getElementById('topicFilters');
  topicEl.innerHTML = topicsSorted.map(([topic,cnt]) =>
    `<button class="filter-btn" data-type="topic" data-val="${topic}" onclick="toggleFilter('topic','${topic}')">`+
    `<span>${topic}</span><span class="count">${cnt}</span></button>`
  ).join('');

  // Stats
  document.getElementById('totalCount').textContent = ALL_REPOS.length.toLocaleString();
  document.getElementById('langCount').textContent = Object.keys(langMap).length;
  document.getElementById('topicsTotal').textContent = Object.keys(topicMap).length.toLocaleString();
}

function toggleFilter(type, val) {
  if(type==='lang') {
    activeLang = activeLang===val ? null : val;
    activeTopic = null;
  } else {
    activeTopic = activeTopic===val ? null : val;
    activeLang = null;
  }
  updateActiveButtons();
  render();
}

function updateActiveButtons() {
  document.querySelectorAll('.filter-btn').forEach(btn => {
    const isActive = (btn.dataset.type==='lang' && btn.dataset.val===activeLang) ||
                     (btn.dataset.type==='topic' && btn.dataset.val===activeTopic);
    btn.classList.toggle('active', isActive);
  });
}

function clearFilters() {
  activeLang = null; activeTopic = null;
  document.getElementById('searchInput').value = '';
  searchQuery = '';
  updateActiveButtons();
  render();
}

function getFiltered() {
  let results = ALL_REPOS;
  if(searchQuery) {
    const q = searchQuery.toLowerCase();
    results = results.filter(r =>
      r.name.toLowerCase().includes(q) ||
      r.description.toLowerCase().includes(q) ||
      r.topics.some(t => t.toLowerCase().includes(q))
    );
  }
  if(activeLang) results = results.filter(r => (r.language||'Unknown')===activeLang);
  if(activeTopic) results = results.filter(r => r.topics.includes(activeTopic));
  return results;
}

function sortRepos(repos) {
  const sort = document.getElementById('sortSelect').value;
  return [...repos].sort((a,b) => {
    if(sort==='starred') return b.stars - a.stars;
    if(sort==='forks') return b.forks - a.forks;
    if(sort==='name') return a.name.localeCompare(b.name);
    if(sort==='updated') return b.updated.localeCompare(a.updated);
    return 0;
  });
}

function render() {
  const filtered = sortRepos(getFiltered());
  const grid = document.getElementById('reposGrid');
  const empty = document.getElementById('emptyState');
  
  document.getElementById('filteredCount').textContent = filtered.length.toLocaleString();
  document.getElementById('resultsLabel').textContent = `${filtered.length} result${filtered.length!==1?'s':''}`;
  
  if(!filtered.length) {
    grid.innerHTML=''; empty.style.display='block'; return;
  }
  empty.style.display='none';
  
  // Render max 200 at once for performance
  const visible = filtered.slice(0,300);
  grid.innerHTML = visible.map(r => {
    const [owner, name] = r.name.split('/');
    const lang = r.language || '';
    const dot = lang ? `<span class="lang-dot" style="background:${LANG_COLORS[lang]||'var(--color-text-faint)'}"></span>` : '';
    const topTags = r.topics.slice(0,4).map(t=>`<span class="tag">${t}</span>`).join('');
    return `<div class="card" onclick="window.open('${r.url}','_blank')">
      <div class="card-header">
        <div>
          <div class="card-name"><span style="color:var(--color-text-muted);font-weight:400">${owner}/</span>${name}</div>
          ${r.archived?'<span class="archived-badge">archived</span>':''}
        </div>
        <div style="display:flex;gap:6px;align-items:center;flex-shrink:0">
          <span style="font-size:11px;color:var(--color-text-faint);font-family:var(--font-mono)">★ ${r.stars.toLocaleString()}</span>
        </div>
      </div>
      <div class="card-desc">${r.description||'<em>No description</em>'}</div>
      ${topTags?`<div class="tags">${topTags}</div>`:''}
      <div class="card-meta">
        ${lang?`<span class="meta-pill">${dot}<span>${lang}</span></span>`:''}
        ${r.forks?`<span class="meta-pill">⑂ ${r.forks.toLocaleString()}</span>`:''}
      </div>
    </div>`;
  }).join('');
  
  if(filtered.length > 300) {
    grid.innerHTML += `<div style="grid-column:1/-1;text-align:center;padding:var(--space-8);color:var(--color-text-muted);font-size:var(--text-xs)">Showing 300 of ${filtered.length} results — use search or filters to narrow down</div>`;
  }
}

// Export helpers
function exportResults() {
  const data = getFiltered();
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const a = document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='github_stars_filtered.json'; a.click();
}

function exportMarkdown() {
  const data = sortRepos(getFiltered());
  let md = `# GitHub Stars — aryateja2106\n\nTotal: ${data.length} repos\n\n`;
  const byLang = {};
  data.forEach(r => {
    const l = r.language || 'Unknown';
    if(!byLang[l]) byLang[l]=[];
    byLang[l].push(r);
  });
  Object.entries(byLang).sort((a,b)=>b[1].length-a[1].length).forEach(([lang,repos])=>{
    md += `## ${lang} (${repos.length})\n\n`;
    repos.forEach(r=>{
      md += `- [${r.name}](${r.url}) — ${r.description||'No description'}\n`;
    });
    md += '\n';
  });
  const blob = new Blob([md], {type:'text/markdown'});
  const a = document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='github_stars.md'; a.click();
}

// Search debounce
let searchTimer;
document.getElementById('searchInput').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(()=>{ searchQuery=e.target.value.trim(); render(); }, 200);
});

// Theme toggle
(function(){
  const t=document.querySelector('[data-theme-toggle]'),r=document.documentElement;
  let d='dark'; r.setAttribute('data-theme',d);
  t&&t.addEventListener('click',()=>{
    d=d==='dark'?'light':'dark'; r.setAttribute('data-theme',d);
    t.innerHTML=d==='dark'
      ?'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>'
      :'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>';
  });
})();

buildSidebar();
render();
</script>
